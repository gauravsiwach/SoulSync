<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SoulSync - Mobile App</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .phone-container {
            width: 375px;
            height: 812px;
            background: #000;
            border-radius: 40px;
            padding: 10px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        
        .phone-screen {
            width: 100%;
            height: 100%;
            background: white;
            border-radius: 30px;
            overflow: hidden;
            position: relative;
        }
        
        .status-bar {
            height: 44px;
            background: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
            font-size: 14px;
            font-weight: 600;
        }
        
        .app-content {
            height: calc(100% - 44px);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px;
            text-align: center;
        }
        
        .logo {
            font-size: 48px;
            margin-bottom: 20px;
        }
        
        .app-title {
            font-size: 32px;
            font-weight: bold;
            color: #333;
            margin-bottom: 16px;
        }
        
        .app-subtitle {
            font-size: 18px;
            color: #666;
            margin-bottom: 40px;
        }
        
        .status-indicator {
            background: #e8f5e8;
            color: #4CAF50;
            padding: 12px 24px;
            border-radius: 20px;
            font-weight: 600;
            margin-bottom: 20px;
        }
        
        .feature-list {
            text-align: left;
            background: #f8f9fa;
            padding: 20px;
            border-radius: 12px;
            margin-top: 20px;
        }
        
        .feature-item {
            display: flex;
            align-items: center;
            margin-bottom: 12px;
            color: #333;
        }
        
        .feature-item:last-child {
            margin-bottom: 0;
        }
        
        .checkmark {
            color: #4CAF50;
            margin-right: 12px;
            font-weight: bold;
        }
        
        .next-button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 16px 32px;
            border-radius: 25px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 30px;
            transition: transform 0.2s;
        }
        
        .next-button:hover {
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <div class="phone-container">
        <div class="phone-screen">
            <div class="status-bar">
                <span>9:41</span>
                <span>SoulSync</span>
                <span>100%</span>
            </div>
            <div class="app-content">
                <div class="logo">🧘‍♀️</div>
                <h1 class="app-title">SoulSync</h1>
                <p class="app-subtitle">Your AI Mental Health Companion</p>
                
                <div class="status-indicator">
                    ✅ Phase 0 Complete
                </div>
                
                <div class="feature-list">
                    <div class="feature-item">
                        <span class="checkmark">✓</span>
                        <span>Expo + React Native + TypeScript</span>
                    </div>
                    <div class="feature-item">
                        <span class="checkmark">✓</span>
                        <span>Expo Router Navigation</span>
                    </div>
                    <div class="feature-item">
                        <span class="checkmark">✓</span>
                        <span>Zustand State Management</span>
                    </div>
                    <div class="feature-item">
                        <span class="checkmark">✓</span>
                        <span>React Query API Client</span>
                    </div>
                    <div class="feature-item">
                        <span class="checkmark">✓</span>
                        <span>Backend API Ready</span>
                    </div>
                    <div class="feature-item">
                        <span class="checkmark">✓</span>
                        <span>Database Services Running</span>
                    </div>
                </div>
                
                <button class="next-button" onclick="showNextPhase()">
                    Start Phase 1: Auth & Profile
                </button>
            </div>
        </div>
    </div>

    <script>
        function showNextPhase() {
            alert('🚀 Ready for Phase 1 Development!\n\nNext steps:\n1. User Authentication\n2. Profile Setup\n3. Onboarding Flow\n\nMobile app structure is ready!');
        }
        
        // Simulate mobile app feel
        document.addEventListener('DOMContentLoaded', function() {
            console.log('🧘‍♀️ SoulSync Mobile App Loaded');
            console.log('📱 Phase 0 Foundation Complete');
            console.log('🚀 Ready for Phase 1 Development');
        });
    </script>
</body>
</html>
